name: tailor_management_system
description: A production-ready Tailor Management System app.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.1

  # Database & Storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2

  # Dependency Injection
  get_it: ^7.6.0

  # Cryptography / Hashing
  crypto: ^3.0.3

  # Utilities & Logging
  logger: ^2.3.0
  excel: ^4.0.6
  intl: ^0.19.0
  uuid: ^4.3.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
